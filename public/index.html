<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Hello Work ID is your carrir assistant. Upload your CV and ask questions about job applications, interview tips, and career advice." />
  <meta name="author" content="Abdusha"/>

  <meta property="og:title" content="Hello Work ID - Carrer Assistant"/>
  <meta property="og:description" content="Hello Work ID is your carrir assistant. Upload your CV and ask questions about job applications, interview tips, and career advice."/>

  <title>Hello Work ID - Carrer Assistant</title>
  <link rel="stylesheet" href="style.css"/>  
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- HTML Sanitizer (prevent XSS) -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1>Hello Work ID</h1>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Ketika pertanyaan atau upload CV mu..." autocomplete="off" required />
      <input type="file" id="file-input" accept=".pdf,.txt,.doc,.docx" style="display: none;" />
      <button type="button" id="attach-btn" class="attach-btn" title="Upload CV">
        <i class="fas fa-paperclip"></i>
      </button>
      <button type="button" id="clear-file-btn" class="clear-file-btn" title="Clear file" style="display: none;">
        <i class="fas fa-times"></i>
      </button>
      <button type="submit" class="send-btn">Send</button>
    </form>
    <div id="file-status" class="file-status"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
